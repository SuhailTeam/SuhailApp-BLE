<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Suhail — Smart Glasses Companion</title>
  <style>
    :root {
      --bg: #0D111C;
      --surface: #1a1f2e;
      --divider: #252a3a;
      --accent: #06B6D4;
      --text: #fff;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 12px;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    main {
      padding-bottom: 72px;
    }

    .tab-content {
      display: none;
      padding: 16px;
      animation: fadeIn 0.2s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Bottom Navigation ─── */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      inset-inline: 0;
      background: var(--surface);
      border-top: 1px solid var(--divider);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 12px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-btn.active {
      color: var(--accent);
    }

    .nav-btn .nav-icon {
      font-size: 20px;
      line-height: 1;
    }

    /* ─── Status Banner ─── */
    .status-banner {
      background: linear-gradient(135deg, #0e7490, #06B6D4);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    .status-dot.offline {
      background: var(--error);
    }

    .status-label {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .status-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
    }

    .status-battery {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ─── Section Label ─── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-inline-start: 2px;
    }

    /* ─── Command Cards ─── */
    .cmd-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cmd-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: 10px;
      padding: 12px;
    }

    .cmd-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .cmd-info {
      flex: 1;
      min-width: 0;
    }

    .cmd-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .cmd-example {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── Contacts Tab ─── */
    .search-bar {
      position: relative;
      margin-bottom: 14px;
    }

    .search-bar input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      padding: 10px 12px 10px 36px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
    }

    .search-bar .search-icon {
      position: absolute;
      inset-inline-start: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .contacts-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .contacts-header h2 {
      font-size: 16px;
      font-weight: 700;
    }

    .face-count-badge {
      background: rgba(6,182,212,0.15);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 480px) {
      .contacts-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .contact-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .contact-card:active {
      background: var(--divider);
    }

    .contact-thumb {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 14px;
      object-fit: cover;
      border: 2px solid var(--accent);
    }

    .letter-avatar {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #06B6D4, #a855f7);
      border: 2px solid var(--accent);
    }

    .contact-info {
      width: 100%;
      min-width: 0;
      text-align: center;
    }

    .contact-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-date {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── Empty / Error States ─── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 14px;
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
    }

    /* ─── Activity Feed ─── */
    .activity-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      border-inline-start: 3px solid var(--text-muted);
    }

    .activity-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .activity-info {
      flex: 1;
      min-width: 0;
    }

    .activity-name {
      font-size: 12px;
      font-weight: 500;
      color: #fff;
    }

    .activity-result {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-time {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-inline-start: auto;
      padding-inline-start: 8px;
    }

    /* ─── Settings ─── */
    .settings-section {
      margin-bottom: 24px;
    }

    .settings-section .section-label {
      margin-bottom: 12px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 8px;
    }

    .setting-label {
      font-size: 13px;
      color: #e2e8f0;
    }

    .setting-value {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .setting-value.green { color: var(--success); }
    .setting-value.amber { color: #f59e0b; }
    .setting-value.red { color: var(--error); }

    .slider-row {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 8px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .slider-label {
      font-size: 13px;
      color: #e2e8f0;
    }

    .slider-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    /* Custom range slider */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--divider);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(6,182,212,0.4);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(6,182,212,0.4);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 2px;
      background: var(--divider);
    }

    /* Button group */
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 0;
    }

    .btn-option {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1px solid var(--divider);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-option.selected {
      background: rgba(6,182,212,0.15);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .setting-btn-row {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 8px;
    }

    .setting-btn-label {
      font-size: 13px;
      color: #e2e8f0;
      margin-bottom: 10px;
    }

    .about-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
    }

    .about-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .about-sub {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ─── Modal ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      inset-inline-end: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-photo {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .modal-letter-avatar {
      width: 100%;
      height: 180px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #06B6D4, #a855f7);
      margin-bottom: 16px;
    }

    .modal-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .modal-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
    }

    .modal-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-family: var(--font);
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .modal-btn:active { opacity: 0.8; }

    .modal-btn.rename {
      background: rgba(6,182,212,0.15);
      color: var(--accent);
    }

    .modal-btn.delete {
      background: rgba(239,68,68,0.15);
      color: var(--error);
    }

    .rename-form {
      display: none;
      gap: 8px;
      margin-top: 12px;
    }

    .rename-form.active {
      display: flex;
    }

    .rename-form input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--divider);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
    }

    .rename-form input:focus { border-color: var(--accent); }

    .rename-form button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
    }

    .rename-save {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    .rename-cancel {
      background: var(--divider);
      color: var(--text-secondary);
    }

    /* ─── Fullscreen Photo ─── */
    .fullscreen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 300;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .fullscreen-overlay.active {
      display: flex;
    }

    .fullscreen-overlay img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      border-radius: 4px;
    }

    /* ─── Flash animation ─── */
    @keyframes flashRed {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 0 2px var(--error); }
    }

    .flash-error {
      animation: flashRed 0.3s ease 2;
    }

    /* ─── Focus Visibility (Accessibility) ─── */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>

<main>
  <!-- ═══ Tab 1: Home ═══ -->
  <section id="tab-home" class="tab-content active" role="tabpanel" aria-labelledby="nav-home">
    <div class="status-banner" id="status-banner" aria-live="polite">
      <div class="status-left">
        <span class="status-dot" id="status-dot"></span>
        <div>
          <div class="status-label">Mentra Live</div>
          <div class="status-sub" id="status-text">Connected</div>
        </div>
      </div>
      <div class="status-battery" id="status-battery">&mdash;</div>
    </div>

    <div class="section-label" id="home-commands-label">VOICE COMMANDS</div>
    <div class="cmd-list" id="cmd-list"></div>
  </section>

  <!-- ═══ Tab 2: Contacts ═══ -->
  <section id="tab-contacts" class="tab-content" role="tabpanel" aria-labelledby="nav-contacts">
    <div class="contacts-header">
      <h2 id="contacts-title">Contacts</h2>
      <span class="face-count-badge" id="face-count">0</span>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search contacts..." aria-label="Search contacts" />
    </div>
    <div id="contacts-list"></div>
  </section>

  <!-- ═══ Tab 3: Activity ═══ -->
  <section id="tab-activity" class="tab-content" role="tabpanel" aria-labelledby="nav-activity">
    <div class="section-label" id="activity-label">ACTIVITY</div>
    <div id="activity-list"></div>
  </section>

  <!-- ═══ Tab 4: Settings ═══ -->
  <section id="tab-settings" class="tab-content" role="tabpanel" aria-labelledby="nav-settings">
    <!-- Device -->
    <div class="settings-section">
      <div class="section-label" id="settings-device-label">DEVICE</div>
      <div class="setting-row">
        <span class="setting-label" id="lbl-battery">Battery</span>
        <span class="setting-value" id="settings-battery">&mdash;</span>
      </div>
      <div class="setting-row">
        <span class="setting-label" id="lbl-connection">Connection</span>
        <span class="setting-value" id="settings-connection">—</span>
      </div>
    </div>

    <!-- Voice Output -->
    <div class="settings-section">
      <div class="section-label" id="settings-voice-label">VOICE OUTPUT</div>
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-label" id="lbl-speed">Speech Speed</span>
          <span class="slider-value" id="speed-value">1.0x</span>
        </div>
        <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" aria-label="Speech Speed" aria-valuemin="0.5" aria-valuemax="2.0" aria-valuenow="1.0" />
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-label" id="lbl-volume">Volume</span>
          <span class="slider-value" id="volume-value">100%</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="100" step="1" value="100" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100" />
      </div>
      <div class="setting-btn-row">
        <div class="setting-btn-label" id="lbl-voice-preset">Voice Preset</div>
        <div class="btn-group" id="voice-preset-group">
          <button class="btn-option selected" data-value="default" id="vp-default">Default</button>
          <button class="btn-option" data-value="male" id="vp-male">Male</button>
          <button class="btn-option" data-value="female" id="vp-female">Female</button>
        </div>
      </div>
    </div>

    <!-- App -->
    <div class="settings-section">
      <div class="section-label" id="settings-app-label">APP</div>
      <div class="setting-btn-row">
        <div class="setting-btn-label" id="lbl-language">Language</div>
        <div class="btn-group" id="language-group">
          <button class="btn-option" data-value="ar" id="lang-ar">العربية</button>
          <button class="btn-option selected" data-value="en" id="lang-en">English</button>
        </div>
      </div>
    </div>

    <!-- About -->
    <div class="settings-section">
      <div class="section-label" id="settings-about-label">ABOUT</div>
      <div class="about-row">
        <span class="about-name">Suhail v1.0.0</span>
        <span class="about-sub">SWE 496</span>
      </div>
    </div>
  </section>
</main>

<!-- ─── Bottom Nav ─── -->
<nav id="bottom-nav" role="tablist" aria-label="Main navigation">
  <button class="nav-btn active" data-tab="home" role="tab" id="nav-home" aria-selected="true" aria-controls="tab-home" aria-label="Home">
    <span class="nav-icon">🏠</span>
    <span class="nav-label" data-str="navHome">Home</span>
  </button>
  <button class="nav-btn" data-tab="contacts" role="tab" id="nav-contacts" aria-selected="false" aria-controls="tab-contacts" aria-label="Contacts">
    <span class="nav-icon">👥</span>
    <span class="nav-label" data-str="navContacts">Contacts</span>
  </button>
  <button class="nav-btn" data-tab="activity" role="tab" id="nav-activity" aria-selected="false" aria-controls="tab-activity" aria-label="Activity">
    <span class="nav-icon">📋</span>
    <span class="nav-label" data-str="navActivity">Activity</span>
  </button>
  <button class="nav-btn" data-tab="settings" role="tab" id="nav-settings" aria-selected="false" aria-controls="tab-settings" aria-label="Settings">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label" data-str="navSettings">Settings</span>
  </button>
</nav>

<!-- ─── Face Detail Modal ─── -->
<div class="modal-overlay" id="face-modal" role="dialog" aria-modal="true" aria-labelledby="modal-name">
  <div class="modal-content">
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    <div id="modal-photo-container"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-actions" id="modal-actions">
      <button class="modal-btn rename" id="modal-rename-btn">Rename</button>
      <button class="modal-btn delete" id="modal-delete-btn">Delete</button>
    </div>
    <div class="rename-form" id="rename-form">
      <input type="text" id="rename-input" placeholder="New name..." />
      <button class="rename-save" id="rename-save">Save</button>
      <button class="rename-cancel" id="rename-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ─── Fullscreen Photo ─── -->
<div class="fullscreen-overlay" id="fullscreen-overlay">
  <img id="fullscreen-img" src="" alt="" />
</div>

<script>
(function() {
  'use strict';

  // ─── Bilingual Strings ───
  const STRINGS = {
    navHome:         { en: 'Home',       ar: 'الرئيسية' },
    navContacts:     { en: 'Contacts',   ar: 'جهات الاتصال' },
    navActivity:     { en: 'Activity',   ar: 'النشاط' },
    navSettings:     { en: 'Settings',   ar: 'الإعدادات' },
    connected:       { en: 'Connected',  ar: 'متصل' },
    disconnected:    { en: 'Disconnected', ar: 'غير متصل' },
    voiceCommands:   { en: 'VOICE COMMANDS', ar: 'الأوامر الصوتية' },
    contacts:        { en: 'Contacts',   ar: 'جهات الاتصال' },
    searchPlaceholder: { en: 'Search contacts...', ar: 'بحث في جهات الاتصال...' },
    activity:        { en: 'ACTIVITY',   ar: 'النشاط' },
    device:          { en: 'DEVICE',     ar: 'الجهاز' },
    voiceOutput:     { en: 'VOICE OUTPUT', ar: 'المخرجات الصوتية' },
    app:             { en: 'APP',        ar: 'التطبيق' },
    about:           { en: 'ABOUT',      ar: 'حول' },
    battery:         { en: 'Battery',    ar: 'البطارية' },
    connection:      { en: 'Connection', ar: 'الاتصال' },
    speechSpeed:     { en: 'Speech Speed', ar: 'سرعة الكلام' },
    volume:          { en: 'Volume',     ar: 'مستوى الصوت' },
    voicePreset:     { en: 'Voice Preset', ar: 'نوع الصوت' },
    language:        { en: 'Language',   ar: 'اللغة' },
    rename:          { en: 'Rename',     ar: 'إعادة تسمية' },
    delete_:         { en: 'Delete',     ar: 'حذف' },
    enrolled:        { en: 'Enrolled',   ar: 'تم التسجيل' },
    emptyContacts:   { en: "Say \"Remember this person\" while wearing the glasses", ar: "قل \"احفظ هالشخص\" أثناء ارتداء النظارة" },
    errorContacts:   { en: 'Could not load contacts', ar: 'تعذر تحميل جهات الاتصال' },
    retry:           { en: 'Retry',      ar: 'إعادة المحاولة' },
    emptyActivity:   { en: 'Activity will appear here as you use voice commands', ar: 'سيظهر النشاط هنا عند استخدام الأوامر الصوتية' },
    confirmDelete:   { en: 'Are you sure you want to delete this contact?', ar: 'هل أنت متأكد من حذف جهة الاتصال هذه؟' },
    vpDefault:       { en: 'Default', ar: 'افتراضي' },
    vpMale:          { en: 'Male',    ar: 'ذكر' },
    vpFemale:        { en: 'Female',  ar: 'أنثى' },
    newName:         { en: 'New name...', ar: 'الاسم الجديد...' },
    save:            { en: 'Save',    ar: 'حفظ' },
    cancel:          { en: 'Cancel',  ar: 'إلغاء' },
    faces:           { en: 'faces',   ar: 'وجوه' },
  };

  const CMD_DEFS = [
    { icon: '👁',  nameEn: 'Describe Scene',  nameAr: 'وصف المشهد',      exEn: '"What\'s around me?"', exAr: '"ايش حولي؟"',       bg: 'rgba(6,182,212,0.2)' },
    { icon: '👤', nameEn: 'Recognize Face',   nameAr: 'التعرف على الوجه', exEn: '"Who is this?"',       exAr: '"من هذا؟"',         bg: 'rgba(168,85,247,0.2)' },
    { icon: '📖', nameEn: 'Read Text',        nameAr: 'قراءة نص',         exEn: '"Read this"',          exAr: '"اقرأ هذا"',        bg: 'rgba(34,197,94,0.2)' },
    { icon: '🔍', nameEn: 'Find Object',      nameAr: 'البحث عن شيء',     exEn: '"Find my keys"',       exAr: '"وين مفاتيحي؟"',   bg: 'rgba(59,130,246,0.2)' },
    { icon: '💰', nameEn: 'Currency',         nameAr: 'عملة',             exEn: '"Count money"',        exAr: '"عد الفلوس"',       bg: 'rgba(245,158,11,0.2)' },
    { icon: '🎨', nameEn: 'Color',            nameAr: 'لون',              exEn: '"What color?"',        exAr: '"ايش اللون؟"',      bg: 'rgba(236,72,153,0.2)' },
    { icon: '👥', nameEn: 'Enroll Face',      nameAr: 'تسجيل وجه',        exEn: '"Remember this person"', exAr: '"احفظ هالشخص"',   bg: 'rgba(168,85,247,0.2)' },
    { icon: '💬', nameEn: 'Ask Anything',     nameAr: 'اسأل أي شيء',      exEn: '"What does this say?"',  exAr: '"ايش يقول هذا؟"', bg: 'rgba(139,92,246,0.2)' },
  ];

  const CMD_COLORS = {
    'scene':          '#06B6D4',
    'face-recognize': '#a855f7',
    'face-enroll':    '#a855f7',
    'ocr':            '#22c55e',
    'currency':       '#f59e0b',
    'find-object':    '#3b82f6',
    'color':          '#ec4899',
    'visual-qa':      '#8b5cf6',
    'system':         '#64748b',
  };

  const CMD_ICONS = {
    'scene': '👁', 'face-recognize': '👤', 'face-enroll': '👥',
    'ocr': '📖', 'currency': '💰', 'find-object': '🔍',
    'color': '🎨', 'visual-qa': '💬', 'system': '⚙️',
  };

  const CMD_NAMES = {
    'scene':          { en: 'Scene Described',       ar: 'تم وصف المشهد' },
    'face-recognize': { en: 'Face Recognized',       ar: 'تم التعرف على الوجه' },
    'face-enroll':    { en: 'Face Enrolled',         ar: 'تم تسجيل الوجه' },
    'ocr':            { en: 'Text Read',             ar: 'تم قراءة النص' },
    'find-object':    { en: 'Object Found',          ar: 'تم البحث عن شيء' },
    'currency':       { en: 'Currency Identified',   ar: 'تم التعرف على العملة' },
    'color':          { en: 'Color Detected',        ar: 'تم كشف اللون' },
    'visual-qa':      { en: 'Question Answered',     ar: 'تم الإجابة على السؤال' },
  };

  // ─── State ───
  let lang = localStorage.getItem('suhail-lang') || 'en';
  let statusData = { online: false, battery: null, charging: null };
  let facesData = [];
  let currentFace = null;
  let settingsDebounce = null;

  function t(obj) {
    if (!obj) return '';
    return obj[lang] || obj.en || '';
  }

  // ─── Tab Navigation ───
  const navBtns = document.querySelectorAll('.nav-btn');
  const tabs = document.querySelectorAll('.tab-content');

  navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      navBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      tabs.forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
      document.getElementById('tab-' + tab).classList.add('active');
    });
  });

  // ─── Language ───
  function setLang(l) {
    lang = l;
    localStorage.setItem('suhail-lang', l);
    document.documentElement.lang = l === 'ar' ? 'ar' : 'en';
    document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
    renderAllUI();
    saveSettings({ language: l });
  }

  function renderAllUI() {
    // Nav labels
    document.querySelectorAll('[data-str]').forEach(el => {
      const key = el.dataset.str;
      if (STRINGS[key]) el.textContent = t(STRINGS[key]);
    });

    // Section labels
    document.getElementById('home-commands-label').textContent = t(STRINGS.voiceCommands);
    document.getElementById('contacts-title').textContent = t(STRINGS.contacts);
    document.getElementById('search-input').placeholder = t(STRINGS.searchPlaceholder);
    document.getElementById('activity-label').textContent = t(STRINGS.activity);
    document.getElementById('settings-device-label').textContent = t(STRINGS.device);
    document.getElementById('settings-voice-label').textContent = t(STRINGS.voiceOutput);
    document.getElementById('settings-app-label').textContent = t(STRINGS.app);
    document.getElementById('settings-about-label').textContent = t(STRINGS.about);
    document.getElementById('lbl-battery').textContent = t(STRINGS.battery);
    document.getElementById('lbl-connection').textContent = t(STRINGS.connection);
    document.getElementById('lbl-speed').textContent = t(STRINGS.speechSpeed);
    document.getElementById('lbl-volume').textContent = t(STRINGS.volume);
    document.getElementById('lbl-voice-preset').textContent = t(STRINGS.voicePreset);
    document.getElementById('lbl-language').textContent = t(STRINGS.language);
    document.getElementById('vp-default').textContent = t(STRINGS.vpDefault);
    document.getElementById('vp-male').textContent = t(STRINGS.vpMale);
    document.getElementById('vp-female').textContent = t(STRINGS.vpFemale);
    document.getElementById('modal-rename-btn').textContent = t(STRINGS.rename);
    document.getElementById('modal-delete-btn').textContent = t(STRINGS.delete_);
    document.getElementById('rename-input').placeholder = t(STRINGS.newName);
    document.getElementById('rename-save').textContent = t(STRINGS.save);
    document.getElementById('rename-cancel').textContent = t(STRINGS.cancel);

    // Re-render dynamic sections
    renderCommands();
    renderStatus();
    renderContacts();
    renderActivity();

    // Refresh slider gradients — direction depends on document dir, which may
    // have just flipped on a language change.
    const sp = document.getElementById('speed-slider');
    const vol = document.getElementById('volume-slider');
    if (sp) updateSliderGradient(sp);
    if (vol) updateSliderGradient(vol);
  }

  // ─── Commands List ───
  function renderCommands() {
    const list = document.getElementById('cmd-list');
    list.innerHTML = CMD_DEFS.map(c => `
      <div class="cmd-card">
        <div class="cmd-icon" style="background:${c.bg}">${c.icon}</div>
        <div class="cmd-info">
          <div class="cmd-name">${lang === 'ar' ? c.nameAr : c.nameEn}</div>
          <div class="cmd-example">${lang === 'ar' ? c.exAr : c.exEn}</div>
        </div>
      </div>
    `).join('');
  }

  // ─── Status ───
  function renderStatus() {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    const bat = document.getElementById('status-battery');
    const sBat = document.getElementById('settings-battery');
    const sConn = document.getElementById('settings-connection');

    if (statusData.online) {
      dot.classList.remove('offline');
      txt.textContent = t(STRINGS.connected);
    } else {
      dot.classList.add('offline');
      txt.textContent = t(STRINGS.disconnected);
    }

    if (statusData.battery !== null && statusData.battery !== undefined) {
      bat.textContent = '🔋 ' + statusData.battery + '%';
      sBat.textContent = statusData.battery + '%';
      sBat.className = 'setting-value ' + (statusData.battery > 20 ? 'green' : 'amber');
    } else {
      bat.innerHTML = '&mdash;';
      sBat.innerHTML = '&mdash;';
      sBat.className = 'setting-value';
    }

    if (statusData.online) {
      sConn.textContent = t(STRINGS.connected);
      sConn.className = 'setting-value green';
    } else {
      sConn.textContent = t(STRINGS.disconnected);
      sConn.className = 'setting-value red';
    }
  }

  async function pollStatus() {
    try {
      const res = await fetch('/api/status');
      if (res.ok) {
        statusData = await res.json();
      } else {
        statusData.online = false;
      }
    } catch {
      statusData.online = false;
    }
    renderStatus();
  }

  // ─── Contacts ───
  async function loadFaces() {
    const list = document.getElementById('contacts-list');
    try {
      const res = await fetch('/api/faces');
      if (!res.ok) throw new Error('Failed');
      const data = await res.json();
      facesData = data.faces || [];
      document.getElementById('face-count').textContent = (data.count || 0) + ' ' + t(STRINGS.faces);
      renderContacts();
    } catch {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <p>${t(STRINGS.errorContacts)}</p>
          <button class="retry-btn" onclick="window.__retryFaces()">${t(STRINGS.retry)}</button>
        </div>`;
    }
  }

  window.__retryFaces = loadFaces;

  function renderContacts() {
    const list = document.getElementById('contacts-list');
    const query = (document.getElementById('search-input').value || '').toLowerCase();
    const filtered = facesData.filter(f => f.name.toLowerCase().includes(query));

    if (facesData.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">👤</div>
          <p>${t(STRINGS.emptyContacts)}</p>
        </div>`;
      return;
    }

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>—</p></div>`;
      return;
    }

    const cards = filtered.map(f => {
      const thumb = f.hasPhoto
        ? `<img class="contact-thumb" src="/api/faces/${f.faceId}/photo" alt="${esc(f.name)}" />`
        : `<div class="letter-avatar">${f.name.charAt(0).toUpperCase()}</div>`;
      return `
        <div class="contact-card" onclick="window.__openFace('${esc(f.faceId)}')">
          ${thumb}
          <div class="contact-info">
            <div class="contact-name">${esc(f.name)}</div>
            <div class="contact-date">${relativeTime(f.enrolledAt)}</div>
          </div>
        </div>`;
    }).join('');
    list.innerHTML = `<div class="contacts-grid">${cards}</div>`;
  }

  document.getElementById('search-input').addEventListener('input', renderContacts);

  // ─── Face Modal ───
  window.__openFace = function(faceId) {
    const face = facesData.find(f => f.faceId === faceId);
    if (!face) return;
    currentFace = face;

    const photoContainer = document.getElementById('modal-photo-container');
    if (face.hasPhoto) {
      photoContainer.innerHTML = `<img class="modal-photo" id="modal-photo-img" src="/api/faces/${face.faceId}/photo" alt="${esc(face.name)}" />`;
      document.getElementById('modal-photo-img').addEventListener('click', () => {
        document.getElementById('fullscreen-img').src = `/api/faces/${face.faceId}/photo`;
        document.getElementById('fullscreen-overlay').classList.add('active');
      });
    } else {
      photoContainer.innerHTML = `<div class="modal-letter-avatar">${face.name.charAt(0).toUpperCase()}</div>`;
    }

    document.getElementById('modal-name').textContent = face.name;
    document.getElementById('modal-date').textContent = t(STRINGS.enrolled) + ' · ' + relativeTime(face.enrolledAt);
    document.getElementById('rename-form').classList.remove('active');
    document.getElementById('face-modal').classList.add('active');
  };

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('face-modal').classList.remove('active');
  });

  document.getElementById('face-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('face-modal')) {
      document.getElementById('face-modal').classList.remove('active');
    }
  });

  document.getElementById('fullscreen-overlay').addEventListener('click', () => {
    document.getElementById('fullscreen-overlay').classList.remove('active');
  });

  document.getElementById('modal-rename-btn').addEventListener('click', () => {
    const form = document.getElementById('rename-form');
    form.classList.add('active');
    document.getElementById('rename-input').value = currentFace ? currentFace.name : '';
    document.getElementById('rename-input').focus();
  });

  document.getElementById('rename-cancel').addEventListener('click', () => {
    document.getElementById('rename-form').classList.remove('active');
  });

  document.getElementById('rename-save').addEventListener('click', async () => {
    if (!currentFace) return;
    const newName = document.getElementById('rename-input').value.trim();
    if (!newName) return;
    try {
      const res = await fetch(`/api/faces/${currentFace.faceId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName }),
      });
      if (res.ok) {
        document.getElementById('modal-name').textContent = newName;
        document.getElementById('rename-form').classList.remove('active');
        currentFace.name = newName;
        renderContacts();
      }
    } catch { /* ignore */ }
  });

  document.getElementById('modal-delete-btn').addEventListener('click', async () => {
    if (!currentFace) return;
    if (!confirm(t(STRINGS.confirmDelete))) return;
    try {
      const res = await fetch(`/api/faces/${currentFace.faceId}`, { method: 'DELETE' });
      if (res.ok) {
        document.getElementById('face-modal').classList.remove('active');
        facesData = facesData.filter(f => f.faceId !== currentFace.faceId);
        currentFace = null;
        document.getElementById('face-count').textContent = facesData.length + ' ' + t(STRINGS.faces);
        renderContacts();
      }
    } catch { /* ignore */ }
  });

  // ─── Activity ───
  let activityData = [];

  async function pollActivity() {
    try {
      const res = await fetch('/api/activity');
      if (res.ok) {
        activityData = await res.json();
        renderActivity();
      }
    } catch { /* ignore */ }
  }

  function renderActivity() {
    const list = document.getElementById('activity-list');
    if (!activityData || activityData.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>${t(STRINGS.emptyActivity)}</p>
        </div>`;
      return;
    }

    const sorted = [...activityData].reverse();
    list.innerHTML = sorted.map(entry => {
      const type = entry.type || 'system';
      const color = CMD_COLORS[type] || CMD_COLORS.system;
      const icon = CMD_ICONS[type] || '⚙️';
      let name;
      if (type === 'system' || !CMD_NAMES[type]) {
        name = entry.event || type;
      } else {
        name = t(CMD_NAMES[type]);
      }
      const preview = entry.result || entry.event || '';
      return `
        <div class="activity-card" style="border-inline-start-color:${color}">
          <div class="activity-icon">${icon}</div>
          <div class="activity-info">
            <div class="activity-name">${esc(name)}</div>
            ${preview ? `<div class="activity-result">${esc(preview)}</div>` : ''}
          </div>
          <span class="activity-time">${relativeTime(entry.time)}</span>
        </div>`;
    }).join('');
  }

  // ─── Settings ───
  const speedSlider = document.getElementById('speed-slider');
  const volumeSlider = document.getElementById('volume-slider');

  function updateSliderGradient(slider) {
    const min = parseFloat(slider.min);
    const max = parseFloat(slider.max);
    const val = parseFloat(slider.value);
    const pct = ((val - min) / (max - min)) * 100;
    // In RTL the slider thumb moves right-to-left, so the filled portion must
    // grow from the right edge — otherwise the fill and the thumb desync.
    const dir = document.documentElement.dir === 'rtl' ? 'to left' : 'to right';
    slider.style.background = `linear-gradient(${dir}, #06B6D4 0%, #06B6D4 ${pct}%, #252a3a ${pct}%, #252a3a 100%)`;
  }

  speedSlider.addEventListener('input', () => {
    document.getElementById('speed-value').textContent = parseFloat(speedSlider.value).toFixed(1) + 'x';
    speedSlider.setAttribute('aria-valuenow', speedSlider.value);
    updateSliderGradient(speedSlider);
    debouncedSaveSettings({ speechSpeed: parseFloat(speedSlider.value) });
  });

  volumeSlider.addEventListener('input', () => {
    document.getElementById('volume-value').textContent = Math.round(volumeSlider.value) + '%';
    volumeSlider.setAttribute('aria-valuenow', volumeSlider.value);
    updateSliderGradient(volumeSlider);
    debouncedSaveSettings({ volume: parseInt(volumeSlider.value) / 100 });
  });

  function debouncedSaveSettings(partial) {
    clearTimeout(settingsDebounce);
    settingsDebounce = setTimeout(() => saveSettings(partial), 300);
  }

  async function saveSettings(partial) {
    try {
      const res = await fetch('/api/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(partial),
      });
      if (!res.ok) throw new Error();
    } catch {
      // Flash red on relevant control
      const el = Object.keys(partial)[0];
      let target;
      if (el === 'speechSpeed') target = speedSlider;
      else if (el === 'volume') target = volumeSlider;
      if (target) {
        target.classList.add('flash-error');
        setTimeout(() => target.classList.remove('flash-error'), 600);
      }
    }
  }

  // Voice preset buttons
  document.querySelectorAll('#voice-preset-group .btn-option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#voice-preset-group .btn-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      saveSettings({ voicePreset: btn.dataset.value });
    });
  });

  // Language buttons
  document.getElementById('lang-ar').addEventListener('click', () => {
    document.querySelectorAll('#language-group .btn-option').forEach(b => b.classList.remove('selected'));
    document.getElementById('lang-ar').classList.add('selected');
    setLang('ar');
  });

  document.getElementById('lang-en').addEventListener('click', () => {
    document.querySelectorAll('#language-group .btn-option').forEach(b => b.classList.remove('selected'));
    document.getElementById('lang-en').classList.add('selected');
    setLang('en');
  });

  async function loadSettings() {
    try {
      const res = await fetch('/api/settings');
      if (!res.ok) return;
      const s = await res.json();
      if (s.speechSpeed !== undefined) {
        speedSlider.value = s.speechSpeed;
        document.getElementById('speed-value').textContent = parseFloat(s.speechSpeed).toFixed(1) + 'x';
        updateSliderGradient(speedSlider);
      }
      if (s.volume !== undefined) {
        const vol = Math.round(s.volume * 100);
        volumeSlider.value = vol;
        document.getElementById('volume-value').textContent = vol + '%';
        updateSliderGradient(volumeSlider);
      }
      if (s.voicePreset) {
        document.querySelectorAll('#voice-preset-group .btn-option').forEach(b => b.classList.remove('selected'));
        const vpBtn = document.querySelector(`#voice-preset-group [data-value="${s.voicePreset}"]`);
        if (vpBtn) vpBtn.classList.add('selected');
      }
      if (s.language) {
        document.querySelectorAll('#language-group .btn-option').forEach(b => b.classList.remove('selected'));
        const lBtn = document.getElementById('lang-' + s.language);
        if (lBtn) lBtn.classList.add('selected');
        if (s.language !== lang) {
          lang = s.language;
          localStorage.setItem('suhail-lang', lang);
          document.documentElement.lang = lang === 'ar' ? 'ar' : 'en';
          document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        }
      }
    } catch { /* ignore */ }
  }

  // ─── Utility ───
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function relativeTime(dateStr) {
    if (!dateStr) return '';
    const now = Date.now();
    const then = new Date(dateStr).getTime();
    const diff = Math.max(0, now - then);
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);

    if (lang === 'ar') {
      if (seconds < 60) return 'الآن';
      if (minutes < 60) return 'قبل ' + minutes + ' دقيقة';
      if (hours < 24) return 'قبل ' + hours + ' ساعة';
      if (days === 1) return 'أمس';
      if (days < 7) return 'قبل ' + days + ' أيام';
      return new Date(dateStr).toLocaleDateString('ar-SA');
    }

    if (seconds < 60) return 'Just now';
    if (minutes < 60) return minutes + 'm ago';
    if (hours < 24) return hours + 'h ago';
    if (days === 1) return 'Yesterday';
    if (days < 7) return days + ' days ago';
    return new Date(dateStr).toLocaleDateString('en-US');
  }

  // ─── Init ───
  async function init() {
    // Apply saved language
    const savedLang = localStorage.getItem('suhail-lang');
    if (savedLang) {
      lang = savedLang;
      document.documentElement.lang = lang === 'ar' ? 'ar' : 'en';
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.querySelectorAll('#language-group .btn-option').forEach(b => b.classList.remove('selected'));
      const lBtn = document.getElementById('lang-' + lang);
      if (lBtn) lBtn.classList.add('selected');
    }

    // Load settings from server (may override local lang)
    await loadSettings();

    // Initial renders
    renderAllUI();
    updateSliderGradient(speedSlider);
    updateSliderGradient(volumeSlider);

    // Initial data loads
    pollStatus();
    loadFaces();
    pollActivity();

    // Polling intervals
    setInterval(pollStatus, 5000);
    setInterval(loadFaces, 30000);
    setInterval(pollActivity, 5000);
  }

  init();
})();
</script>
</body>
</html>
